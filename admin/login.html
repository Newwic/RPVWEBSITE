<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>RPV Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg?v=20260715-r">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body class="admin-page">
    <main class="admin-auth">
      <section class="admin-auth-card" aria-labelledby="adminLoginTitle">
        <div class="admin-auth-brand">
          <img class="admin-logo" src="../assets/logoRPV.png" alt="RPV">
          <div>
            <p class="admin-kicker">RPV ADMIN</p>
            <h1 id="adminLoginTitle">ระบบจัดการเว็บไซต์</h1>
          </div>
        </div>
        <p>เข้าสู่ระบบเพื่อจัดการสินค้า หน้าเว็บ แบนเนอร์ เมนู และข้อมูลติดต่อของเว็บไซต์ RPV</p>

        <form class="admin-form" id="adminLoginForm">
          <label>
            ชื่อผู้ใช้งาน / Email
            <input type="email" id="adminEmail" autocomplete="email" placeholder="admin@rpv.co.th" required>
          </label>
          <label>
            รหัสผ่าน
            <input type="password" id="adminPassword" autocomplete="current-password" placeholder="Password" required>
          </label>
          <button class="button primary admin-login-button" type="submit">เข้าสู่ระบบ</button>
          <p class="admin-status" id="adminLoginStatus" role="status"></p>
        </form>

        <div class="admin-note">
          <strong>หมายเหตุ</strong>
          <span>ตอนนี้เป็นระบบหลังบ้านของโปรเจกต์ RPVWEBSITE ถ้าจะบันทึกจริงแบบออนไลน์ต้องเชื่อม Supabase ก่อน</span>
        </div>
      </section>
    </main>

    <script src="config.js"></script>
    <script type="module" src="admin.js?v=20260717-login-fix"></script>
  </body>
</html>
